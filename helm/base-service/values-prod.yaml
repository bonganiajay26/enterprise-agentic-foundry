# Production environment overrides
replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 1Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 2

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: myservice.your-domain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: myservice-prod-tls
      hosts:
        - myservice.your-domain.com

externalSecrets:
  enabled: true
  refreshInterval: 5m
  secretStore:
    name: azure-key-vault
    kind: ClusterSecretStore

env:
  LOG_LEVEL: warn
  NODE_ENV: production

app:
  environment: production
