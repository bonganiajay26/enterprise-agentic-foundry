# Development environment overrides
replicaCount: 1

autoscaling:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

podDisruptionBudget:
  enabled: false

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
  hosts:
    - host: myservice-dev.your-domain.com
      paths:
        - path: /
          pathType: Prefix

env:
  LOG_LEVEL: debug
  NODE_ENV: development

app:
  environment: development
